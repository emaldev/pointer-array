<!DOCTYPE html>
<html>
<head>
    <title>Emal Portfolio</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        .card {
            margin-top: 100px;
            padding: 30px;
            background-color: #1e293b;
            width: 350px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0px 0px 20px #38bdf8;
        }

        button {
            padding: 10px 20px;
            border: none;
            background-color: #38bdf8;
            color: black;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background-color: #0ea5e9;
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Emal</h1>
        <h3>Future Software Engineer 💻</h3>
        <p>I am learning C++ and Web Development.</p>

        <button onclick="showMessage()">Click Me</button>
    </div>

    <script>
        function showMessage() {
            alert("Keep coding! You are getting stronger 🔥");
        }
    </script>

</body>
</html>
